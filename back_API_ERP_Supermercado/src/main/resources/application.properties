spring.application.name=back_API_ERP_Supermercado

server.port=${SERVER_PORT}

jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

spring.jpa.database=POSTGRESQL
spring.sql.init.platform=postgres

# Cambiar el nombre de la BD en la .env
spring.datasource.url=${BD_URL}

#Cambiar el usuario de tu base de datos, password
spring.datasource.username=${BD_USER}
spring.datasource.password=${BD_PASSWORD}

spring.datasource.driver-class-name=org.postgresql.Driver



